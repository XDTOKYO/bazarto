<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazarto | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden-view { display: none; }
        .product-card img { transition: transform 0.6s ease; }
        .product-card:hover img { transform: scale(1.03); }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-50 px-8 py-5 flex justify-between items-center">
        <h1 onclick="showHome()" class="serif text-3xl font-bold text-pink-600 cursor-pointer tracking-tighter">Bazarto.</h1>
        <div onclick="toggleCart()" class="relative cursor-pointer p-2 bg-gray-50 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-light">
                <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="cartCount" class="absolute -top-1 -right-1 bg-pink-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
        </div>
    </nav>

    <section id="homeView">
        <div class="py-24 text-center">
            <h2 class="serif text-7xl mb-4">Premium Picks.</h2>
            <p class="text-gray-400 tracking-[0.3em] uppercase text-[10px]">Aesthetic Cases & Soft Companions</p>
        </div>
        <div class="container mx-auto px-8 pb-24">
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-16"></div>
        </div>
    </section>

    <section id="productView" class="hidden-view min-h-screen py-16 px-8">
        <div class="container mx-auto max-w-6xl">
            <button onclick="showHome()" class="mb-12 text-gray-400 hover:text-pink-600 uppercase text-xs tracking-widest font-bold">← Back to Store</button>
            <div class="flex flex-col lg:flex-row gap-20 items-start">
                <div class="lg:w-1/2 w-full"><img id="detailImage" src="" class="w-full rounded-[2.5rem] shadow-sm aspect-square object-cover bg-gray-50"></div>
                <div class="lg:w-1/2 w-full">
                    <span id="detailCat" class="text-pink-500 font-bold tracking-widest text-[10px] uppercase"></span>
                    <h2 id="detailTitle" class="serif text-5xl mt-4 mb-6"></h2>
                    <p id="detailPrice" class="text-3xl text-gray-400 font-light mb-10"></p>
                    
                    <div id="modelSection" class="mb-8">
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-3">Select Model</label>
                        <select id="modelSelect" class="w-full border border-gray-200 p-4 rounded-xl focus:outline-none focus:border-pink-500 transition"></select>
                    </div>

                    <div class="border-t border-gray-100 py-8 mb-8 text-gray-500 leading-relaxed text-lg" id="detailDesc"></div>
                    
                    <button id="addToCartBtn" class="w-full bg-black text-white py-5 rounded-2xl font-bold text-lg hover:bg-pink-600 transition shadow-xl transform active:scale-95">Add to Bag</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // MASTER INVENTORY - Change names, prices, and images here!
        const inventory = [
            { 
                id: 1, 
                title: "Obsidian Eye Case", 
                price: 45, 
                cat: "iPhone 17 Collection", 
                img: "images/case1.jpg", 
                models: ["iPhone 17", "iPhone 17 Pro", "iPhone 17 Pro Max"],
                desc: "Premium matte finish with our signature triple-lens protection eye design."
            },
            { 
                id: 2, 
                title: "Terracotta Weave Case", 
                price: 35, 
                cat: "iPhone 17 Collection", 
                img: "images/case2.jpg", 
                models: ["iPhone 17 Pro", "iPhone 17 Pro Max"],
                desc: "Textured weave pattern for superior grip and heat dissipation."
            },
            { 
                id: 3, 
                title: "Blush Velvet Bear", 
                price: 60, 
                cat: "Soft Companions", 
                img: "images/bear1.jpg", 
                models: ["Small (10 inch)", "Large (20 inch)", "Giant (60cm)"],
                desc: "Ultra-soft rose pink plush with eco-friendly hypoallergenic filling."
            },
            { 
                id: 4, 
                title: "Classic Cocoa Teddy", 
                price: 40, 
                cat: "Soft Companions", 
                img: "images/bear2.jpg", 
                models: ["Standard Edition"],
                desc: "The vintage brown bear that started it all. Hand-stitched detailing."
            },
            { 
                id: 3, 
                title: "Meow", 
                price: 60, 
                cat: "Soft Companions", 
                img: "images/bear3.jpg", 
                models: ["Small (10 inch)", "Large (20 inch)", "Giant (60cm)"],
                desc: "Ultra-soft rose pink plush with eco-friendly hypoallergenic filling."
            // Add more items here following the same structure!
        ];

        function renderGrid() {
            document.getElementById('productGrid').innerHTML = inventory.map(p => `
                <div class="product-card cursor-pointer group" onclick="showProduct(${p.id})">
                    <div class="rounded-[2.5rem] overflow-hidden aspect-[4/5] bg-gray-50 border border-gray-50">
                        <img src="${p.img}" alt="${p.title}" class="w-full h-full object-cover">
                    </div>
                    <div class="mt-8 text-center px-4">
                        <p class="text-[9px] text-pink-500 font-bold tracking-[0.2em] uppercase mb-2">${p.cat}</p>
                        <h3 class="serif text-2xl text-gray-900 group-hover:text-pink-600 transition">${p.title}</h3>
                        <p class="text-gray-400 font-light mt-2">$${p.price}.00</p>
                    </div>
                </div>
            `).join('');
        }

        function showProduct(id) {
            const p = inventory.find(x => x.id === id);
            document.getElementById('detailImage').src = p.img;
            document.getElementById('detailTitle').innerText = p.title;
            document.getElementById('detailCat').innerText = p.cat;
            document.getElementById('detailPrice').innerText = `$${p.price}.00`;
            document.getElementById('detailDesc').innerText = p.desc;
            
            // Populate Model Selector
            const selector = document.getElementById('modelSelect');
            selector.innerHTML = p.models.map(m => `<option value="${m}">${m}</option>`).join('');
            
            document.getElementById('homeView').classList.add('hidden-view');
            document.getElementById('productView').classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('homeView').classList.remove('hidden-view');
            document.getElementById('productView').classList.add('hidden-view');
            window.scrollTo(0,0);
        }

        renderGrid();
    </script>
</body>
</html>
