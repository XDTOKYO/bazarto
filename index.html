<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazarto | Luxury 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden-view { display: none; }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card img { transition: transform 0.6s ease; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 onclick="showHome()" class="serif text-3xl font-bold text-pink-600 cursor-pointer tracking-tighter">Bazarto.</h1>
            <div class="flex items-center space-x-6">
                <button onclick="showHome()" class="hidden md:block text-xs font-bold uppercase tracking-widest hover:text-pink-600">Store</button>
                <div onclick="toggleCart()" class="relative cursor-pointer p-2 bg-pink-50 rounded-full group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-pink-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-black text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="cartOverlay" onclick="toggleCart()" class="fixed inset-0 bg-black/30 z-[60] hidden backdrop-blur-sm"></div>
    <div id="cartPanel" class="fixed right-0 top-0 h-full w-full max-w-md bg-white z-[70] translate-x-full cart-drawer shadow-2xl flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="serif text-2xl">Your Bag</h2>
            <button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-black transition">&times;</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>
        <div class="p-6 border-t bg-gray-50 font-bold text-xl flex justify-between">
            <span>Total:</span>
            <span id="cartTotal">$0.00</span>
        </div>
        <div class="p-6 pt-0 bg-gray-50">
            <button class="w-full bg-pink-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-pink-700 transition">Checkout</button>
        </div>
    </div>

    <section id="homeView">
        <div class="py-20 text-center bg-gradient-to-b from-pink-50/50 to-white">
            <h2 class="serif text-6xl md:text-8xl text-gray-900 mb-4">Premium Picks.</h2>
            <p class="text-gray-400 uppercase tracking-[0.4em] text-xs">Aesthetic Cases & Soft Companions</p>
        </div>
        <div class="container mx-auto px-6 pb-24">
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
                </div>
        </div>
    </section>

    <section id="productView" class="hidden-view min-h-screen py-12 px-6">
        <div class="container mx-auto">
            <button onclick="showHome()" class="mb-10 text-pink-500 font-bold uppercase text-xs flex items-center gap-2">
                <span>&larr;</span> Back to Selection
            </button>
            <div class="flex flex-col lg:flex-row gap-16 items-start">
                <div class="lg:w-1/2 w-full">
                    <img id="detailImage" src="" class="w-full rounded-[3rem] shadow-2xl aspect-square object-cover">
                </div>
                <div class="lg:w-1/2 w-full">
                    <span id="detailCat" class="text-pink-400 font-bold tracking-widest text-xs uppercase"></span>
                    <h2 id="detailTitle" class="serif text-6xl text-gray-900 mt-4 mb-6"></h2>
                    <p id="detailPrice" class="text-4xl text-gray-300 font-light mb-10"></p>
                    <div class="border-t border-gray-100 py-10">
                        <h4 class="font-bold text-gray-900 text-lg mb-4">Specifications</h4>
                        <ul id="detailQualities" class="space-y-3 text-gray-500 text-lg"></ul>
                    </div>
                    <p id="detailDesc" class="text-gray-400 leading-relaxed text-xl mb-12"></p>
                    <button id="addToCartBtn" class="w-full bg-gray-900 text-white py-6 rounded-2xl font-bold text-xl hover:bg-pink-600 transition shadow-2xl shadow-pink-100 transform active:scale-95">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 border-t border-gray-100 text-center">
        <p class="serif text-3xl text-pink-600 mb-2 font-bold">Bazarto.</p>
        <p class="text-gray-400 text-sm">Crafted for the modern lifestyle. © 2026</p>
    </footer>

    <script>
        /* INSTRUCTIONS FOR 100 IMAGES:
           1. Create a folder named 'images' in your project root.
           2. Save 100 images as case1.jpg, case2.jpg... bear50.jpg etc.
           3. The paths below will then work perfectly.
        */

        const inventory = [];
        
        // Let's generate the 100-item inventory structure
        for(let i=1; i<=100; i++) {
            const isCase = i <= 50;
            inventory.push({
                id: i,
                title: isCase ? `Pro Max Case Style #${i}` : `Luxury Teddy Edition #${i}`,
                category: isCase ? "iPhone 17 Collection" : "Plushie Boutique",
                price: isCase ? 35 : 55,
                // These point to your future 'images' folder
                image: isCase ? `images/case${i}.jpg` : `images/bear${i-50}.jpg`, 
                desc: `This premium ${isCase ? 'case' : 'plushie'} represents the peak of Bazarto's 2026 design language, combining aesthetic appeal with everyday functionality.`,
                qualities: isCase ? ["360 Camera Shield", "MagSafe Ready", "Anti-Friction Surface"] : ["Silk-Feel Texture", "Cotton-Fill Interior", "Safe for Children"]
            });
        }

        // --- RENDER LOGIC ---
        function renderGrid() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = inventory.map(p => `
                <div class="product-card cursor-pointer group" onclick="showProduct(${p.id})">
                    <div class="rounded-[2.5rem] overflow-hidden aspect-[4/5] bg-gray-50 border border-gray-50">
                        <img src="${p.image}" alt="${p.title}" class="w-full h-full object-cover">
                    </div>
                    <div class="mt-6 text-center">
                        <p class="text-[10px] text-pink-500 font-bold tracking-widest uppercase mb-1">${p.category}</p>
                        <h3 class="serif text-2xl text-gray-900 group-hover:text-pink-600 transition">${p.title}</h3>
                        <p class="text-gray-400 font-light mt-1">$${p.price}.00</p>
                    </div>
                </div>
            `).join('');
        }

        function showProduct(id) {
            const p = inventory.find(x => x.id === id);
            document.getElementById('detailImage').src = p.image;
            document.getElementById('detailTitle').innerText = p.title;
            document.getElementById('detailCat').innerText = p.category;
            document.getElementById('detailPrice').innerText = `$${p.price}.00`;
            document.getElementById('detailDesc').innerText = p.desc;
            document.getElementById('detailQualities').innerHTML = p.qualities.map(q => `<li>✦ ${q}</li>`).join('');
            document.getElementById('addToCartBtn').onclick = () => addToCart(p.id);
            
            document.getElementById('homeView').classList.add('hidden-view');
            document.getElementById('productView').classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('homeView').classList.remove('hidden-view');
            document.getElementById('productView').classList.add('hidden-view');
            window.scrollTo(0,0);
        }

        // --- CART LOGIC ---
        let cart = [];
        function toggleCart() {
            const panel = document.getElementById('cartPanel');
            const overlay = document.getElementById('cartOverlay');
            panel.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function addToCart(id) {
            const p = inventory.find(x => x.id === id);
            cart.push(p);
            updateCart();
            toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            let total = 0;
            const itemsDiv = document.getElementById('cartItems');
            
            if(cart.length === 0) {
                itemsDiv.innerHTML = `<p class="text-center text-gray-300 mt-20">Your bag is empty.</p>`;
                document.getElementById('cartTotal').innerText = "$0.00";
                return;
            }

            itemsDiv.innerHTML = cart.map((p, i) => {
                total += p.price;
                return `
                    <div class="flex items-center gap-4 bg-white border border-gray-100 p-4 rounded-2xl">
                        <img src="${p.image}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm truncate">${p.title}</h4>
                            <p class="text-pink-600 font-semibold">$${p.price}</p>
                        </div>
                        <button onclick="removeFromCart(${i})" class="text-gray-300 hover:text-red-500 transition">✕</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').innerText = `$${total}.00`;
        }

        // Start the store
        renderGrid();
    </script>
</body>
</html>
